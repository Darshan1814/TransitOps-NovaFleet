apiVersion: apps/v1
kind: Deployment
metadata:
  name: novafleet-deployment
  namespace: novafleet-staging
  labels:
    app: novafleet
    tier: frontend
spec:
  replicas: 1 # Baseline single replicaset as requested
  selector:
    matchLabels:
      app: novafleet
  template:
    metadata:
      labels:
        app: novafleet
    spec:
      containers:
      - name: novafleet-app
        image: IMAGE_TAG_PLACEHOLDER
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        env:
        - name: NODE_ENV
          value: "production"
        # AWS credentials (placeholders)
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-creds
              key: access_key_id
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-creds
              key: secret_access_key
              optional: true
        - name: AWS_REGION
          valueFrom:
            secretKeyRef:
              name: aws-creds
              key: region
              optional: true
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 15
