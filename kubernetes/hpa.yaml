apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: novafleet-hpa
  namespace: novafleet-staging
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: novafleet-deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
